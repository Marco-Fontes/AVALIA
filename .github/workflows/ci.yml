name: CI

# Enforça nos PRs (e em push para master) os mesmos gates rodados localmente
# (CLAUDE.md §Comandos canônicos): lint, formatação, tipos e testes.
on:
  pull_request:
  push:
    branches: [master]

# Cancela execuções antigas do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    # Postgres real → os testes-contrato do repositório de laudos (T-601) deixam de ser
    # "skipped" e passam a ser exercitados de verdade (AVALIA_PG_DSN definido abaixo).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # DSN consumido pelos testes de persistência (tests/persistence/test_repository.py).
      AVALIA_PG_DSN: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,observability]"

      - name: Ruff (lint)
        run: python -m ruff check .

      - name: Ruff (formatação)
        run: python -m ruff format --check .

      - name: Mypy (tipos, strict em src)
        run: python -m mypy src

      - name: Pytest (suíte completa, inclui Postgres via serviço)
        run: python -m pytest -q

      - name: Guarda RNF-05 (não-execução do alvo)
        run: python -m pytest tests/guards -q
